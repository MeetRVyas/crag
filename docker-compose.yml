services :
    backend :
        build :
            context : ./backend
            dockerfile : Dockerfile
        ports :
          - "8000:8000"
        volumes:
          - backend_data:/app/data
          - session_storage:/tmp/sessions
        env_file :
          - ./backend/.env
        depends_on :
          - redis
          - ollama
        command : uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
        restart: unless-stopped
        deploy:
          resources:
            limits:
              cpus: "1.0"
              memory: 1g
    
    ollama:
      image: ollama/ollama:latest
      ports:
        - "11434:11434"
      volumes:
        - ollama_models:/root/.ollama
      restart: unless-stopped
      deploy:
        resources:
          limits:
            cpus: "2.0"
            memory: 4g
    
    redis :
        image : redis:7-alpine
        command : redis-server --appendonly yes
        volumes:
          - redis_data:/data
        restart: unless-stopped
        deploy:
          resources:
            limits:
              memory: 512m

volumes:
  ollama_models:
  session_storage:
  redis_data:
  backend_data: